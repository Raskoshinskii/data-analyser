agent:
  max_retries: 3
  llm:
    model_name: "gpt-4"
    temperature: 0.1
    max_tokens: 1500

database:
  connection_string: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}"
  schema_info_query: "SELECT table_name, column_name, data_type FROM information_schema.columns WHERE table_schema = 'public'"

jira:
  url: "${JIRA_URL}"
  username: "${JIRA_USER}"
  api_token: "${JIRA_PASSWORD}"
  project_key: "${JIRA_PROJECT_KEY}"
