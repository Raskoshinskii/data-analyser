version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: porsche_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  jira:
    image: atlassian/jira-software:latest
    container_name: jira_server
    environment:
      ATL_JDBC_URL: ${ATL_JDBC_URL}
      ATL_JDBC_USER: ${ATL_JDBC_USER}
      ATL_JDBC_PASSWORD: ${ATL_JDBC_PASSWORD}
      ATL_DB_DRIVER: ${ATL_DB_DRIVER}
      ATL_DB_TYPE: ${ATL_DB_TYPE}
      ATL_TOMCAT_PORT: ${ATL_TOMCAT_PORT}
      ATL_TOMCAT_SCHEME: ${ATL_TOMCAT_SCHEME}
      ATL_TOMCAT_SECURE: ${ATL_TOMCAT_SECURE}
      JVM_MINIMUM_MEMORY: ${JVM_MINIMUM_MEMORY}
      JVM_MAXIMUM_MEMORY: ${JVM_MAXIMUM_MEMORY}
    ports:
      - "8080:8080"
    volumes:
      - jira_data:/var/atlassian/application-data/jira
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  jira_data:
